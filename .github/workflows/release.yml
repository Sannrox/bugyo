name: Release

on:
  push:
    tags:
      - "v*"
  # Allow manual runs (produces a draft release from the current ref).
  workflow_dispatch:

# Needed to create the GitHub Release and upload bundles.
permissions:
  contents: write

jobs:
  release:
    name: Release (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Universal binary covers Apple Silicon + Intel Macs.
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
            rust-targets: ""
          - platform: windows-latest
            args: ""
            rust-targets: ""

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Tauri's Linux build dependencies (webkit2gtk etc.).
      - name: Install Tauri system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev
        working-directory: .

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      # Configure macOS code signing without ever exporting *empty* APPLE_*
      # variables. Tauri's bundler treats an empty-but-set APPLE_CERTIFICATE as
      # "present" and tries to `security import` it, which fails. So we only
      # export the certificate/notarization vars when the secret actually
      # exists; otherwise we set an ad-hoc identity ("-"), which needs no Apple
      # account and stops macOS flagging the universal build as "damaged" on
      # Apple Silicon (users still get the "unidentified developer" prompt).
      # Add the APPLE_* repo secrets and the same build becomes fully signed +
      # notarized with no further edits — see docs/macos-code-signing.md.
      - name: Configure macOS code signing
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "Apple certificate present — enabling Developer ID signing + notarization."
            {
              echo "APPLE_CERTIFICATE<<__BUGYO_EOF__"
              echo "$APPLE_CERTIFICATE"
              echo "__BUGYO_EOF__"
              echo "APPLE_CERTIFICATE_PASSWORD<<__BUGYO_EOF__"
              echo "$APPLE_CERTIFICATE_PASSWORD"
              echo "__BUGYO_EOF__"
              echo "APPLE_SIGNING_IDENTITY=${APPLE_SIGNING_IDENTITY:--}"
              echo "APPLE_ID=$APPLE_ID"
              echo "APPLE_PASSWORD=$APPLE_PASSWORD"
              echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
            } >> "$GITHUB_ENV"
          else
            echo "No Apple certificate secret — using ad-hoc signing."
            echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"
          fi

      - name: Build and release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          # For workflow_dispatch (no tag) tauri-action falls back to the app version.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', 'dev') }}
          releaseName: "Bugyo ${{ github.ref_type == 'tag' && github.ref_name || 'dev build' }}"
          releaseBody: "See CHANGELOG.md for release notes."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
