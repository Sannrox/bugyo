name: Bug report
description: Report a problem with Bugyo
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please search existing
        issues first to avoid duplicates. **Do not report security
        vulnerabilities here** — see [SECURITY.md](../../SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the behavior?
      placeholder: |
        1. Create a session with '...'
        2. Approve '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant logs or drag in screenshots. Redact any secrets.
      render: shell
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14.5 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true
  - type: input
    id: bugyo-version
    attributes:
      label: Bugyo version / commit
      placeholder: "0.1.0 or git SHA"
    validations:
      required: true
  - type: input
    id: kiro-version
    attributes:
      label: kiro-cli version
      placeholder: "output of `kiro --version`"
