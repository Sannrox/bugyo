name: Feature request
description: Suggest an idea or enhancement for Bugyo
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please check [PLAN.md](../../PLAN.md)
        and existing issues first — your idea may already be on the roadmap.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve? What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or behavior you'd like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've considered.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, or references that help explain the request.
